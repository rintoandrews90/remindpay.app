document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

height:38px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 8px 24px rgba(46,111,168,.35)}\n.brand-name{font-weight:800;font-size:17px;letter-spacing:-0.3px}\n.nav-cta{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;font-weight:700;font-size:14px;padding:10px 22px;border-radius:9999px;box-shadow:0 8px 24px rgba(46,111,168,.35);border:none;cursor:pointer;transition:transform .2s,box-shadow .2s}\n.nav-cta:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(46,111,168,.45)}\n.hero{background:linear-gradient(180deg,var(--hero-tint) 0%,#fff 100%);padding:72px 5% 40px;text-align:center}\n.badge{display:inline-flex;align-items:center;gap:6px;background:var(--primary-light);color:var(--primary);font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:5px 14px;border-radius:9999px;border:1px solid rgba(46,111,168,.3)}\n.hero h1{font-size:clamp(36px,5vw,56px);font-weight:900;letter-spacing:-1.5px;line-height:1.12;margin:20px 0 14px;background:linear-gradient(135deg,var(--primary),var(--grad-end));-webkit-background-clip:text;background-clip:text;color:transparent}\n.hero p{font-size:17px;color:var(--muted);max-width:560px;margin:0 auto;line-height:1.6}\n.jumpnav{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:32px}\n.jump-pill{display:flex;align-items:center;gap:7px;background:#fff;border:1.5px solid var(--border);border-radius:9999px;padding:9px 18px;font-size:14px;font-weight:600;color:var(--ink);cursor:pointer;transition:.2s}\n.jump-pill:hover{border-color:var(--dot);transform:translateY(-2px)}\n.jump-dot{width:8px;height:8px;border-radius:50%;background:var(--dot)}\n.faq-main{padding:20px 5% 20px}\n.cat-section{max-width:820px;margin:0 auto;padding:56px 0;border-bottom:1px solid var(--border);scroll-margin-top:88px}\n.cat-section:last-child{border-bottom:none}\n.cat-head{display:flex;align-items:center;gap:14px;margin-bottom:28px}\n.cat-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--tint);border:1px solid var(--dot);}\n.cat-icon .msr{color:var(--dot);font-size:22px}\n.cat-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin:0}\n.item{border:1px solid var(--border);border-radius:16px;margin-bottom:12px;overflow:hidden;background:#fff;transition:box-shadow .2s}\n.item.open{box-shadow:0 16px 48px rgba(46,111,168,.1)}\n.q-row{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:20px 22px;cursor:pointer;background:none;border:none;width:100%;text-align:left;font-family:inherit}\n.q-text{font-size:16px;font-weight:700;color:var(--ink);line-height:1.4}\n.chev{color:var(--muted);flex-shrink:0;transition:transform .25s}\n.item.open .chev{transform:rotate(180deg);color:var(--primary)}\n.a-wrap{display:grid;grid-template-rows:0fr;transition:grid-template-rows .25s ease}\n.item.open .a-wrap{grid-template-rows:1fr}\n.a-inner{overflow:hidden}\n.a-text{padding:0 22px 20px;margin:0;font-size:15px;line-height:1.7;color:var(--muted)}\n.cta-band{background:linear-gradient(135deg,var(--primary),var(--grad-end));padding:80px 5%;text-align:center;margin-top:24px}\n.cta-band h2{color:#fff;font-size:clamp(26px,3.5vw,38px);font-weight:900;letter-spacing:-1px;margin:0 0 12px}\n.cta-band p{color:rgba(255,255,255,.85);font-size:16px;margin:0 0 28px}\n.cta-buttons{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}\n.btn-white{background:#fff;color:var(--primary);font-weight:700;font-size:16px;padding:16px 34px;border-radius:9999px;box-shadow:0 8px 30px rgba(0,0,0,.2);border:none;cursor:pointer;transition:transform .2s}\n.btn-white:hover{transform:translateY(-2px)}\n.btn-outline{background:transparent;color:#fff;font-weight:700;font-size:16px;padding:15px 32px;border-radius:9999px;border:1.5px solid rgba(255,255,255,.5);cursor:pointer;transition:.2s}\n.btn-outline:hover{border-color:#fff;transform:translateY(-2px)}\nfooter{background:var(--ink);color:rgba(255,255,255,.7);padding:44px 5% 28px;text-align:center;font-size:13px}\nfooter a{color:rgba(255,255,255,.7)}footer a:hover{color:#fff}\n.cat-blue{--dot:var(--primary);--tint:var(--blue-tint)}\n.cat-orange{--dot:#FF9500;--tint:#FFF7ED}\n.cat-violet{--dot:#8B5CF6;--tint:#F5F3FF}\n.cat-green{--dot:#16A34A;--tint:#F0FDF4}\n.cat-rose{--dot:#E11D48;--tint:#FFF1F2}\n<\u002Fstyle><\u002Fhelmet>\n<nav class=\"nav\"><div class=\"nav-inner\"><div class=\"brand\"><div class=\"brand-icon\"><span class=\"msr\">notifications_active<\u002Fspan><\u002Fdiv><div class=\"brand-name\">RemindPay<\u002Fdiv><\u002Fdiv><button class=\"nav-cta\">Get the App<\u002Fbutton><\u002Fdiv><\u002Fnav>\n<section class=\"hero\" data-screen-label=\"FAQ Hero\"><span class=\"badge\">Support<\u002Fspan><h1>Frequently asked questions<\u002Fh1><p>Everything you need to know about tracking bills, warranties, and reminders with RemindPay — straight answers, no fine print.<\u002Fp>\n<div class=\"jumpnav\">\n<sc-for list=\"{{ categories }}\" as=\"cat\" hint-placeholder-count=\"5\">\n<a class=\"jump-pill {{ cat.accentClass }}\" href=\"{{ cat.href }}\"><span class=\"jump-dot\"><\u002Fspan>{{ cat.label }}<\u002Fa>\n<\u002Fsc-for>\n<\u002Fdiv>\n<\u002Fsection>\n<main class=\"faq-main\">\n<sc-for list=\"{{ categories }}\" as=\"cat\" hint-placeholder-count=\"5\">\n<section class=\"cat-section {{ cat.accentClass }}\" id=\"{{ cat.id }}\">\n<div class=\"cat-head\"><div class=\"cat-icon\"><span class=\"msr\">{{ cat.icon }}<\u002Fspan><\u002Fdiv><h2 class=\"cat-title\">{{ cat.label }}<\u002Fh2><\u002Fdiv>\n<sc-for list=\"{{ cat.items }}\" as=\"item\" hint-placeholder-count=\"4\">\n<div class=\"item {{ item.openClass }}\">\n<button class=\"q-row\" onclick=\"{{ item.toggle }}\"><span class=\"q-text\">{{ item.q }}<\u002Fspan><span class=\"msr chev\">expand_more<\u002Fspan><\u002Fbutton>\n<div class=\"a-wrap\"><div class=\"a-inner\"><p class=\"a-text\">{{ item.a }}<\u002Fp><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-for>\n<\u002Fsection>\n<\u002Fsc-for>\n<\u002Fmain>\n<section class=\"cta-band\"><h2>Still have questions?<\u002Fh2><p>Our support team usually replies within a few hours.<\u002Fp>\n<div class=\"cta-buttons\"><button class=\"btn-white\">Contact Support<\u002Fbutton><button class=\"btn-outline\">Email us<\u002Fbutton><\u002Fdiv>\n<\u002Fsection>\n<footer><div>© 2026 RemindPay. All rights reserved. · <a href=\"#\">Privacy<\u002Fa> · <a href=\"#\">Terms<\u002Fa> · <a href=\"#\">Contact<\u002Fa><\u002Fdiv><\u002Ffooter>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { open: { 'getting-started_0': true } };\n\n  data = [\n    { id: 'getting-started', label: 'Getting Started', icon: 'rocket_launch', accentClass: 'cat-blue', items: [\n      { q: 'What is RemindPay?', a: 'RemindPay is a bill and warranty tracker built for the Apple ecosystem. It watches your subscriptions, device warranties, and recurring bills, and reminds you before anything expires or a payment is due — so nothing sneaks up on you.' },\n      { q: 'How do I add my devices and bills?', a: 'Open the app, tap the + button, and either scan a receipt, connect your Apple ID to auto-detect eligible devices, or add a bill manually with its due date and amount. RemindPay takes it from there.' },\n      { q: 'Which Apple devices does RemindPay support?', a: 'iPhone, iPad, Mac, Apple Watch, and AirPods are all supported, including AppleCare+ coverage windows and standard limited-warranty periods.' },\n      { q: 'Is there a free trial?', a: 'Yes — every new account starts with a 14-day free trial with full access to reminders, warranty tracking, and notifications. No card required to start.' }\n    ]},\n    { id: 'reminders', label: 'Reminders', icon: 'notifications_active', accentClass: 'cat-orange', items: [\n      { q: 'How do reminders work?', a: 'RemindPay sends a push notification and an email ahead of each due date or expiration — by default 7 days and 1 day before — so you always have time to act.' },\n      { q: 'Can I customize when I get notified?', a: 'Yes. Each bill or warranty has its own reminder schedule under its detail view — set custom lead times, choose push, email, or both, and mute individual reminders any time.' },\n      { q: 'What if I miss a reminder?', a: 'Missed items move to an Overdue list at the top of your home screen with a gentle daily nudge until you mark them resolved or update the due date.' },\n      { q: 'Do reminders work across all my devices?', a: 'Yes — RemindPay syncs through iCloud, so reminders and settings stay identical whether you check them on iPhone, iPad, or Mac.' }\n    ]},\n    { id: 'warranty-billing', label: 'Warranty & Billing', icon: 'shield_with_heart', accentClass: 'cat-violet', items: [\n      { q: 'How does RemindPay track my AppleCare and warranty status?', a: 'Connect your Apple ID and RemindPay reads your coverage status directly from Apple, keeping expiration dates current automatically — no manual entry needed.' },\n      { q: 'Can I track other bills besides Apple devices?', a: 'Absolutely. RemindPay handles any recurring bill or subscription — rent, streaming services, insurance — alongside your device warranties in one place.' },\n      { q: 'Will RemindPay tell me before my warranty expires?', a: 'Yes, with plenty of notice. You will get a heads-up 30 days out, then again closer to expiration, with a direct link to extend or renew coverage if available.' },\n      { q: 'Can I upload receipts or purchase proof?', a: 'Yes — attach a photo or PDF of any receipt to a bill or device entry. It is stored securely with that item for whenever you need it.' }\n    ]},\n    { id: 'security', label: 'Security & Privacy', icon: 'verified_user', accentClass: 'cat-green', items: [\n      { q: 'Is my payment and account information safe?', a: 'Yes. All data is encrypted in transit and at rest, and we follow standard financial-grade security practices to keep your information protected.' },\n      { q: 'Does RemindPay ever move my money?', a: 'No. RemindPay only tracks and reminds — it never initiates payments, transfers, or has the ability to move your money.' },\n      { q: 'How is my data stored?', a: 'Your data is stored in encrypted cloud databases with strict access controls, and synced privately through your own iCloud account.' },\n      { q: 'Can I delete my data at any time?', a: 'Yes. Delete individual items any time, or remove your entire account and all associated data permanently from Settings in one tap.' }\n    ]},\n    { id: 'support', label: 'Support & Contact', icon: 'support_agent', accentClass: 'cat-rose', items: [\n      { q: 'How do I contact support?', a: 'Tap Help in the app to reach our team directly, or email support@remindpay.app — we typically reply within a few hours.' },\n      { q: 'I found a bug — where do I report it?', a: 'Use the \"Report an Issue\" option under Help in the app, or email us with a short description and screenshot. We read every report.' },\n      { q: 'Do you offer refunds?', a: 'Yes. If you are not satisfied within 14 days of a paid subscription, contact support for a full refund, no questions asked.' },\n      { q: 'How do I cancel my subscription?', a: 'Go to Settings > Subscription > Cancel. Your reminders keep working until the end of your current billing period.' }\n    ]}\n  ];\n\n  toggleFactory(catId, idx) {\n    const key = catId + '_' + idx;\n    return () => this.setState(s => ({ open: { ...s.open, [key]: !s.open[key] } }));\n  }\n\n  renderVals() {\n    const open = this.state.open;\n    const categories = this.data.map(cat => ({\n      id: cat.id, label: cat.label, icon: cat.icon, accentClass: cat.accentClass, href: '#' + cat.id,\n      items: cat.items.map((item, idx) => {\n        const key = cat.id + '_' + idx;\n        return { q: item.q, a: item.a, openClass: open[key] ? 'open' : '', toggle: this.toggleFactory(cat.id, idx) };\n      })\n    }));\n    return { categories };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
